<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Usuários</title>
  <link rel="stylesheet" href="global.css">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2>Sistema</h2>
    <ul>
      <li onclick="ir('dashboard.html')">Dashboard</li>
      <li onclick="ir('produtos.html')">Produtos</li>
      <li onclick="ir('movimentacao.html')">Movimentação</li>
      <li onclick="ir('historico.html')">Histórico</li>
      <li onclick="ir('relatorios.html')">Relatórios</li>
      <li onclick="ir('categorias.html')">Categorias</li>
      <li onclick="ir('fornecedores.html')">Fornecedores</li>
      <li>Usuários</li>
    </ul>
  </div>

  <div class="content">
    <h1>Usuários</h1>

    <input type="text" id="nomeUsuario" placeholder="Nome">
    <input type="email" id="emailUsuario" placeholder="Email">
    <input type="password" id="senhaUsuario" placeholder="Senha">

    <select id="nivelUsuario">
      <option value="">Selecione o nível</option>
      <option value="Administrador">Administrador</option>
      <option value="Gerente">Gerente</option>
      <option value="Funcionario">Funcionário</option>
    </select>

    <button onclick="salvarUsuario()">Cadastrar</button>

    <table>
      <thead>
  <tr>
    <th>Nome</th>
    <th>Email</th>
    <th>Nível</th>
    <th>Ações</th>
  </tr>
</thead>
      <tbody id="tabela-usuarios"></tbody>
    </table>

  </div>

</div>

<script src="./js/usuarios.js"></script>
</body>
</html>
