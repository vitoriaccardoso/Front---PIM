<!DOCTYPE html>
<html lang="pt-br">
<head>

<body>

        <li onclick="ir('relatorios.html')">Relatórios</li>

</div>

    </div>

  </div>

 
  <script>
    function ir(pagina) {
      window.location.href = pagina;
    }
  </script>

<script>

    localStorage.removeItem("usuarioLogado");

</script>
