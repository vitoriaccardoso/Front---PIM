<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="global.css">

  <!-- Ícones -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>Sistema</h2>
      <ul>
        <li onclick="ir('dashboard.html')">
          <span class="material-icons">home</span> Dashboard
        </li>

        <li onclick="ir('produtos.html')">
          <span class="material-icons">inventory_2</span> Produtos
        </li>

        <li onclick="ir('movimentacao.html')">
          <span class="material-icons">sync_alt</span> Movimentação
        </li>

        <li onclick="ir('historico.html')">
          <span class="material-icons">history</span> Histórico
        </li>

        <li onclick="ir('relatorios.html')">
          <span class="material-icons">bar_chart</span> Relatórios
        </li>

        <li onclick="ir('usuarios.html')">
          <span class="material-icons">group</span> Usuários
        </li>

        <li onclick="ir('categorias.html')">
          <span class="material-icons">category</span> Categorias
        </li>

        <li onclick="ir('fornecedores.html')">
          <span class="material-icons">local_shipping</span> Fornecedores
        </li>

        <li onclick="logout()">
          <span class="material-icons">logout</span> Sair
        </li>
      </ul>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">
      
      <h1>
        <span class="material-icons titulo-icon">dashboard</span>
        Dashboard
      </h1>

      <div class="cards">
        <div class="card" id="total"></div>
        <div class="card" id="baixo"></div>
        <div class="card" id="mais"></div>
      </div>

      <div class="grafico-container">

        <div class="legenda-estoque">
          <div class="item-legenda">
            <span class="cor verde"></span> Estoque OK
          </div>
          <div class="item-legenda">
            <span class="cor vermelho"></span> Estoque Baixo
          </div>
        </div>

        <canvas id="graficoProdutos"></canvas>

      </div>

    </div>

  </div>

  <script>
    function ir(pagina) {
      window.location.href = pagina;
    }

    function logout() {
      localStorage.removeItem("usuarioLogado");
      window.location.href = "index.html";
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./js/dashboard.js"></script>

</body>
</html>
