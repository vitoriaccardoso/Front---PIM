<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações</title>

  <link rel="stylesheet" href="global.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2 id="nomeComercio">NexaFlow</h2>

    <ul>

      <li class="somente-admin-gerente" onclick="ir('dashboard.html')">
        <span class="material-icons">dashboard</span>
        Dashboard
      </li>

      <li onclick="ir('estoque.html')">
        <span class="material-icons">inventory_2</span>
        Estoque
      </li>

      <li onclick="ir('vendas.html')">
        <span class="material-icons">point_of_sale</span>
        Vendas
      </li>

      <li class="somente-admin-gerente" onclick="ir('relatorios.html')">
        <span class="material-icons">bar_chart</span>
        Relatórios
      </li>

      <li class="ativo somente-admin" onclick="ir('configuracoes.html')">
        <span class="material-icons">settings</span>
        Configurações
      </li>

      <li onclick="logout()">
        <span class="material-icons">logout</span>
        Sair
      </li>

    </ul>
  </div>

  <div class="content">
    <h1>Configurações</h1>

    <div class="config-grid">

      <div class="config-card">
        <h3>Dados da Empresa</h3>

        <p><strong>Empresa:</strong></p>
        <input type="text" id="empresa">

        <p><strong>E-mail:</strong></p>
        <input type="email" id="emailEmpresa">

        <button onclick="salvarEmpresa()">
          Salvar Alterações
        </button>
      </div>



      <div class="config-card">
        <h3>Sistema</h3>

        <button onclick="limparVendas()">
          Limpar vendas
        </button>

        <button onclick="limparEstoque()">
          Limpar estoque
        </button>
      </div>

    </div>
  </div>

</div>

<script>
  function ir(pagina) {
    window.location.href = pagina;
  }

  function logout() {
    localStorage.clear();
    window.location.href = "login.html";
  }
</script>

<script src="js/global.js"></script>
<script src="js/configuracoes.js"></script>

</body>
</html>
