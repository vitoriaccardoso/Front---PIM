<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Produtos</title>
  <link rel="stylesheet" href="global.css">
</head>
<body>

<div class="container">


  <div class="sidebar">
    <h2>Sistema</h2>
    <ul>
      <li onclick="ir('dashboard.html')">Dashboard</li>
      <li>Produtos</li>
    </ul>
  </div>

 
  <div class="content">
    <h1>Produtos</h1>

<div class="topo">
  <input type="text" id="busca" placeholder="Buscar produto..." onkeyup="filtrar()">

  <select id="filtroCategoria" onchange="filtrar()">
    <option value="">Todas categorias</option>
  </select>

  <button onclick="ir('cadastro-produto.html')">Cadastrar Produto</button>
</div>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Categoria</th>
          <th>Preço</th>
          <th>Quantidade</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela-produtos"></tbody>
    </table>

  </div>

</div>

<script src="./js/produtos.js"></script>
</body>
</html>
