<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Produtos</title>
  <link rel="stylesheet" href="global.css">

  <!-- Ícones -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2>Sistema</h2>
    <ul>
      <li onclick="ir('dashboard.html')">
        <span class="material-icons">home</span> Dashboard
      </li>

      <li class="ativo" onclick="ir('produtos.html')">
        <span class="material-icons">inventory_2</span> Produtos
      </li>

      <li onclick="ir('movimentacao.html')">
        <span class="material-icons">sync_alt</span> Movimentação
      </li>

      <li onclick="ir('historico.html')">
        <span class="material-icons">history</span> Histórico
      </li>

      <li onclick="ir('relatorios.html')">
        <span class="material-icons">bar_chart</span> Relatórios
      </li>

      <li onclick="ir('usuarios.html')">
        <span class="material-icons">group</span> Usuários
      </li>

      <li onclick="ir('categorias.html')">
        <span class="material-icons">category</span> Categorias
      </li>

      <li onclick="ir('fornecedores.html')">
        <span class="material-icons">local_shipping</span> Fornecedores
      </li>

      <li onclick="logout()">
        <span class="material-icons">logout</span> Sair
      </li>
    </ul>
  </div>

  <div class="content">
    <h1>
      <span class="material-icons titulo-icon">inventory_2</span>
      Produtos
    </h1>

    <div class="topo">
      <input type="text" id="busca" placeholder="Buscar produto..." onkeyup="filtrar()">

      <select id="filtroCategoria" onchange="filtrar()">
        <option value="">Todas categorias</option>
      </select>

      <button onclick="ir('cadastro-produto.html')">
        Cadastrar Produto
      </button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Categoria</th>
          <th>Preço</th>
          <th>Quantidade</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela-produtos"></tbody>
    </table>

  </div>

</div>

<script>
  function ir(pagina) {
    window.location.href = pagina;
  }

  function logout() {
    localStorage.removeItem("usuarioLogado");
    window.location.href = "index.html";
  }
</script>

<script src="./js/produtos.js"></script>
</body>
</html>
