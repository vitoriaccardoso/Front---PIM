<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Produto</title>

  <link rel="stylesheet" href="global.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2 id="nomeComercio">NexaFlow</h2>

 <ul>

  <li class="somente-admin-gerente" onclick="ir('dashboard.html')">
    <span class="material-icons">dashboard</span>
    Dashboard
  </li>

  <li class="ativo" onclick="ir('estoque.html')">
    <span class="material-icons">inventory_2</span>
    Estoque
  </li>

  <li onclick="ir('vendas.html')">
    <span class="material-icons">point_of_sale</span>
    Vendas
  </li>

  <li class="somente-admin-gerente" onclick="ir('relatorios.html')">
    <span class="material-icons">bar_chart</span>
    Relatórios
  </li>

  <li onclick="logout()">
    <span class="material-icons">logout</span>
    Sair
  </li>

</ul>
  </div>

  <div class="content">
    <h1>Cadastrar Produto</h1>

    <div class="produto-form">
      <input type="text" id="nome" placeholder="Nome do produto">
      <input type="text" id="categoria" placeholder="Categoria">
      <input type="text" id="codigo" placeholder="Código">
      <input type="number" id="valor" placeholder="Valor">
      <input type="number" id="quantidade" placeholder="Quantidade">

      <p id="erro"></p>

      <button onclick="salvarProduto()">Salvar Produto</button>
    </div>
  </div>

</div>

<script>
  function ir(pagina) {
    window.location.href = pagina;
  }

  function logout() {
    localStorage.removeItem("usuarioLogado");
    window.location.href = "login.html";
  }
</script>

<script src="js/global.js"></script>
<script src="js/cadastro-produto.js"></script>

</body>
</html>
