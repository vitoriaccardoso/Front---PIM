<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Movimentação</title>
  <link rel="stylesheet" href="global.css">
</head>
<body>

<div class="container">

  
  <div class="sidebar">
    <h2>Sistema</h2>
    <ul>
      <li onclick="ir('dashboard.html')">Dashboard</li>
      <li onclick="ir('produtos.html')">Produtos</li>
      <li>Movimentação</li>
    </ul>
  </div>

  
  <div class="content">
    <h1>Movimentação de Estoque</h1>

    <select id="produto"></select>

    <input type="number" id="quantidade" placeholder="Quantidade">

    <select id="tipo">
      <option value="entrada">Entrada</option>
      <option value="saida">Saída</option>
    </select>

    <p id="erro"></p>

    <button onclick="movimentar()">Confirmar</button>
  </div>

</div>

<script src="./js/movimentacao.js"></script>
</body>
</html>
