<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque</title>

  <link rel="stylesheet" href="global.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<div class="container">

<div class="sidebar">

  <h2 id="nomeComercio">NexaFlow</h2>

  <ul class="menu-topo">

    <li class="somente-admin-gerente" onclick="ir('dashboard.html')">
      <span class="material-icons">dashboard</span>
      Dashboard
    </li>

    <li class="ativo" onclick="ir('estoque.html')">
      <span class="material-icons">inventory_2</span>
      Estoque
    </li>

    <li onclick="ir('vendas.html')">
      <span class="material-icons">point_of_sale</span>
      Vendas
    </li>

    <li class="somente-admin-gerente" onclick="ir('relatorios.html')">
      <span class="material-icons">bar_chart</span>
      Relatórios
    </li>

  </ul>

  <ul class="menu-bottom">

    <li class="somente-admin" onclick="ir('configuracoes.html')">
      <span class="material-icons">settings</span>
      Configurações
    </li>

    <li onclick="logout()">
      <span class="material-icons">logout</span>
      Sair
    </li>

  </ul>

</div>

  <div class="content">
    <h1>Estoque</h1>

    <div class="topo-tabela">
      <input type="text" id="busca" placeholder="Buscar produto..." onkeyup="filtrarEstoque()">

      <div class="filtros-tabela">
        <select id="filtroCategoria" onchange="filtrarEstoque()">
          <option value="">Categoria</option>
        </select>

        <select id="filtroStatus" onchange="filtrarEstoque()">
          <option value="">Status</option>
          <option value="ok">OK</option>
          <option value="medio">Médio</option>
          <option value="baixo">Baixo</option>
        </select>
      </div>

      <button onclick="ir('cadastro-produto.html')" class="btn-novo"  somente-admin-gerente id="btnCadastrarProduto">
  Cadastrar Produto
</button>
    </div>

    <div class="cabecalho-tabela">
      <span>Produto</span>
      <span>Categoria</span>
      <span>Código</span>
      <span>Valor</span>
      <span>Status</span>
      <span>Ações</span>
    </div>

    <div class="tabela-card">
      <table>
        <tbody id="tabelaEstoque"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
  function ir(pagina) {
    window.location.href = pagina;
  }

  function logout() {
    localStorage.removeItem("usuarioLogado");
    window.location.href = "login.html";
  }
</script>

<script src="js/global.js"></script>
<script src="js/estoque.js"></script>

</body>
</html>
