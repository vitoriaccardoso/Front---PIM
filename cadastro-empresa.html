<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro da Empresa</title>

  <link rel="stylesheet" href="global.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

  <h1 class="logo">NexaFlow</h1>

  <div class="cadastro-container">

    <div class="cadastro-left">
      <h2>Seja bem<br>vindo de volta!</h2>

      <button onclick="window.location.href='login.html'" class="btn-outline">
        Login
      </button>
    </div>

    <div class="cadastro-right">
      <h1>Cadastre sua empresa</h1>

      <div class="campo">
        <span class="material-icons">business</span>
        <input type="text" id="empresa" placeholder="Empresa">
      </div>

      <div class="campo">
        <span class="material-icons">email</span>
        <input type="email" id="email" placeholder="E-mail">
      </div>

      <div class="campo">
        <span class="material-icons">lock</span>
        <input type="password" id="senha" placeholder="Senha">
      </div>

      <div class="campo">
        <span class="material-icons">lock</span>
        <input type="password" id="confirmarSenha" placeholder="Confirme sua senha">
      </div>

      <p id="erro"></p>

      <button onclick="cadastrarEmpresa()" class="btn-principal">
        Cadastrar
      </button>
    </div>

  </div>

  <script src="js/cadastro.js"></script>
</body>
</html>
