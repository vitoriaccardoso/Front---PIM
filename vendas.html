<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendas</title>

  <link rel="stylesheet" href="global.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<div class="container">

<div class="sidebar">

  <h2 id="nomeComercio">NexaFlow</h2>

  <ul class="menu-topo">

    <li class="somente-admin-gerente" onclick="ir('dashboard.html')">
      <span class="material-icons">dashboard</span>
      Dashboard
    </li>

    <li onclick="ir('estoque.html')">
      <span class="material-icons">inventory_2</span>
      Estoque
    </li>

    <li class="ativo" onclick="ir('vendas.html')">
      <span class="material-icons">point_of_sale</span>
      Vendas
    </li>

    <li class="somente-admin-gerente" onclick="ir('relatorios.html')">
      <span class="material-icons">bar_chart</span>
      Relatórios
    </li>

  </ul>

  <ul class="menu-bottom">

    <li class="somente-admin" onclick="ir('configuracoes.html')">
      <span class="material-icons">settings</span>
      Configurações
    </li>

    <li onclick="logout()">
      <span class="material-icons">logout</span>
      Sair
    </li>

  </ul>

</div>

  <div class="content">
    <h1>Vendas</h1>

  <div class="venda-form">
  <select id="produto"></select>

  <input type="number" id="quantidade" placeholder="Quantidade">

  <select id="pagamento">
    <option value="">Forma de pagamento</option>
    <option value="PIX">PIX</option>
    <option value="Cartão">Cartão</option>
    <option value="Dinheiro">Dinheiro</option>
  </select>

  <button onclick="registrarVenda()">Registrar Venda</button>

  <p id="erro"></p>
</div>

   <div class="cabecalho-tabela">
  <span>ID</span>
  <span>Produto</span>
  <span>Data</span>
  <span>Total</span>
  <span>Pagamento</span>
  <span>Quantidade</span>
</div>

    <div class="tabela-card">
      <table>
        <tbody id="tabelaVendas"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
  function ir(pagina) {
    window.location.href = pagina;
  }

  function logout() {
    localStorage.removeItem("usuarioLogado");
    localStorage.removeItem("perfilUsuario");
    window.location.href = "index.html";
  }
</script>

<script src="js/global.js"></script>
<script src="js/vendas.js"></script>

</body>
</html>
